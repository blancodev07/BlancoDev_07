<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معي — BlancoDev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <div class="wrap">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 30 30"><path d="M15 1 L28 6 V15 C28 22 22 27 15 29 C8 27 2 22 2 15 V6 Z" fill="#182A4A" stroke="#D4AF37" stroke-width="1.4"/><text x="15" y="20.5" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#F4F6FB" text-anchor="middle">B</text></svg>
      BlancoDev
    </div>
    <div class="navlinks">
      <a href="services.html" data-i18n="nav1">الخدمات</a>
      <a href="store.html" data-i18n="nav2">المتجر</a>
      <a href="work.html" data-i18n="nav3">أعمالي</a>
      <a href="about.html" data-i18n="nav4">من أنا</a>
    </div>
    <div class="nav-right">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
      <a href="contact.html" class="nav-cta" data-i18n="navCta">تواصل معي</a>
    </div>
  </div>
</nav>

<section class="section" style="padding-top:60px;">
  <div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" data-i18n="contactEyebrow">تواصل معي</span>
      <h2 data-i18n="contactTitle">عندك مهمة؟ يلا نبدأ</h2>
    </div>

    <div class="contact-grid">
      <div class="contact-box reveal">
        <h2 data-i18n="contactBoxTitle">تواصل مباشر</h2>
        <p data-i18n="contactBoxDesc">راسلني على الإيميل، وأرد عليك خلال 24–48 ساعة.</p>
        <div class="email-pill">
          <span id="emailText">blancodev7@gmail.com</span>
          <button onclick="copyEmail()" id="copyBtn" data-i18n="copyBtn">نسخ الإيميل</button>
        </div>
      </div>

      <div class="form-box reveal">
        <h3 data-i18n="formTitle">أو عبّي طلبك هنا</h3>
        <form id="orderForm">
          <input type="hidden" name="access_key" value="ae1d0fd1-862b-472d-9e1d-bf519615e743">
          <label data-i18n="formName">اسمك</label>
          <input type="text" name="name" required>
          <label data-i18n="formEmail">إيميلك</label>
          <input type="email" name="email" required>
          <label data-i18n="formService">وش تحتاج؟</label>
          <select name="service">
            <option data-i18n="formOpt1">Tier I — إصلاح وتعديل ($5)</option>
            <option data-i18n="formOpt2">Tier II — بناء نظام ($25)</option>
            <option data-i18n="formOpt3">Tier III — مشروع متكامل ($50+)</option>
            <option data-i18n="formOpt4">سكربت جاهز من المتجر</option>
            <option data-i18n="formOpt5">طلب مخصص</option>
          </select>
          <label data-i18n="formMsg">تفاصيل الطلب</label>
          <textarea name="message" required></textarea>
          <label data-i18n="formDiscount">كود الخصم (إن وجد)</label>
          <input type="text" name="discount_code" placeholder="مثال: AHMED10">
          <button type="submit" data-i18n="formSubmit">إرسال الطلب</button>
        </form>
        <div class="form-success" id="formSuccess" data-i18n="formSuccessMsg">تم استلام طلبك! بنرد عليك بأقرب وقت.</div>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div>BlancoDev © 2026</div>
    <div>Roblox Lua Development</div>
  </div>
</footer>
