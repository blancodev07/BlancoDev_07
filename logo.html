<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>BlancoDev Logo Animation</title>\n<style>\n  * {\n    margin: 0;\n    padding: 0;\n    box-sizing: border-box;\n  }\n\n  body {\n    background: #0D1526;\n    display: flex;\n    justify-content: center;\n    align-items: center;\n    min-height: 100vh;\n    font-family: 'Fraunces', serif;\n  }\n\n  .logo-container {\n    position: relative;\n    width: 120px;\n    height: 120px;\n    cursor: pointer;\n  }\n\n  svg {\n    width: 100%;\n    height: 100%;\n    filter: drop-shadow(0 10px 30px rgba(212, 175, 55, 0.2));\n  }\n\n  .logo-circle {\n    animation: rotateCircle 20s linear infinite;\n  }\n\n  .logo-text {\n    font-size: 24px;\n    font-weight: 700;\n    fill: #D4AF37;\n    text-anchor: middle;\n    dominant-baseline: middle;\n  }\n\n  .logo-code {\n    animation: glow 3s ease-in-out infinite;\n  }\n\n  .logo-accent {\n    animation: pulse 2s ease-in-out infinite;\n  }\n\n  @keyframes rotateCircle {\n    from {\n      transform: rotate(0deg);\n    }\n    to {\n      transform: rotate(360deg);\n    }\n  }\n\n  @keyframes glow {\n    0%, 100% {\n      fill: #3159C9;\n      filter: drop-shadow(0 0 5px rgba(49, 89, 201, 0.5));\n    }\n    50% {\n      fill: #D4AF37;\n      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8));\n    }\n  }\n\n  @keyframes pulse {\n    0%, 100% {\n      opacity: 0.6;\n      transform: scale(1);\n    }\n    50% {\n      opacity: 1;\n      transform: scale(1.05);\n    }\n  }\n\n  .logo-container:hover .logo-circle {\n    animation-duration: 8s;\n  }\n\n  .logo-container:hover .logo-code {\n    animation-duration: 1.5s;\n  }\n</style>\n</head>\n<body>\n\n<div class=\"logo-container\">\n  <svg viewBox=\"0 0 120 120\" xmlns=\"http://www.w3.org/2000/svg\">\n    <!-- خلفية دائرية -->\n    <defs>\n      <linearGradient id=\"bgGradient\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">\n        <stop offset=\"0%\" style=\"stop-color:#3159C9;stop-opacity:0.15\" />\n        <stop offset=\"100%\" style=\"stop-color:#182A4A;stop-opacity:0.15\" />\n      </linearGradient>\n      <linearGradient id=\"textGradient\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">\n        <stop offset=\"0%\" style=\"stop-color:#D4AF37\" />\n        <stop offset=\"100%\" style=\"stop-color:#F4D03F\" />\n      </linearGradient>\n    </defs>\n\n    <!-- دائرة خارجية تدور -->\n    <g class=\"logo-circle\">\n      <circle cx=\"60\" cy=\"60\" r=\"55\" fill=\"none\" stroke=\"url(#bgGradient)\" stroke-width=\"2\" opacity=\"0.3\"/>\n      <!-- نقاط دوارة -->\n      <circle cx=\"60\" cy=\"12\" r=\"3\" fill=\"#D4AF37\"/>\n      <circle cx=\"108\" cy=\"60\" r=\"3\" fill=\"#D4AF37\" opacity=\"0.7\"/>\n      <circle cx=\"60\" cy=\"108\" r=\"3\" fill=\"#D4AF37\" opacity=\"0.5\"/>\n      <circle cx=\"12\" cy=\"60\" r=\"3\" fill=\"#D4AF37\" opacity=\"0.3\"/>\n    </g>\n\n    <!-- الخلفية الثابتة -->\n    <circle cx=\"60\" cy=\"60\" r=\"50\" fill=\"#141F38\" stroke=\"#233355\" stroke-width=\"1.5\"/>\n\n    <!-- العناصر الزخرفية -->\n    <g class=\"logo-code\">\n      <!-- كود يسار -->\n      <text x=\"32\" y=\"58\" font-family=\"JetBrains Mono\" font-size=\"14\" font-weight=\"bold\" fill=\"#3159C9\">&lt;</text>\n      <!-- كود يمين -->\n      <text x=\"88\" y=\"58\" font-family=\"JetBrains Mono\" font-size=\"14\" font-weight=\"bold\" fill=\"#3159C9\">/&gt;</text>\n    </g>\n\n    <!-- النص الرئيسي (B) -->\n    <text x=\"60\" y=\"68\" class=\"logo-text\" font-size=\"32\" fill=\"url(#textGradient)\">B</text>\n\n    <!-- خط زخرفي متحرك -->\n    <g class=\"logo-accent\">\n      <line x1=\"45\" y1=\"40\" x2=\"75\" y2=\"40\" stroke=\"#3159C9\" stroke-width=\"2\" opacity=\"0.6\" stroke-linecap=\"round\"/>\n      <line x1=\"45\" y1=\"80\" x2=\"75\" y2=\"80\" stroke=\"#3159C9\" stroke-width=\"2\" opacity=\"0.6\" stroke-linecap=\"round\"/>\n    </g>\n\n    <!-- دوائر صغيرة زخرفية -->\n    <circle cx=\"38\" cy=\"48\" r=\"2\" fill=\"#D4AF37\" opacity=\"0.8\"/>\n    <circle cx=\"82\" cy=\"72\" r=\"2\" fill=\"#D4AF37\" opacity=\"0.8\"/>\n    <circle cx=\"42\" cy=\"82\" r=\"1.5\" fill=\"#3159C9\" opacity=\"0.6\"/>\n  </svg>\n</div>\n\n</body>\n</html>
